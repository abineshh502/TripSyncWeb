<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TripSync Web — Redirecting...</title>
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
      (l.search ? '&' + l.search.slice(1) : '') +
      l.hash
    );
  </script>
</head>
<body style="background-color: #0b0f19; color: #94a3b8; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;">
  <div style="text-align: center;">
    <h2 style="color: #2dd4bf; margin-bottom: 8px;">✈️ TripSync Web</h2>
    <p>Redirecting to destination...</p>
  </div>
</body>
</html>
