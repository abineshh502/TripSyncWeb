name: TripSyncWeb E2E Tests CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-e2e-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r e2e-tests/requirements.txt

    - name: Set up Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'

    - name: Install Frontend Node Dependencies
      run: |
        npm ci

    - name: Validate Next.js Production Build
      run: |
        npm run build > build-log.txt 2>&1 || (cat build-log.txt && exit 1)

    - name: Run Sequential Selenium E2E Tests
      run: |
        npm run test:e2e

    - name: Upload Test Excel Report Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: TripSync-Excel-TestReport
        path: TripSync_TestReport.xlsx

    - name: Upload Test HTML Report Dashboard Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: TripSync-HTML-TestReport
        path: execution-report.html

    - name: Upload Build Log Artifact
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: TripSync-Build-Log
        path: build-log.txt
