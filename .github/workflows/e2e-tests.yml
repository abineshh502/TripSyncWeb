name: TripSyncWeb E2E Tests CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-e2e-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r e2e-tests/requirements.txt

    - name: Set up Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'

    - name: Install Frontend Node Dependencies
      run: |
        npm ci

    - name: Run ESLint Linting
      run: |
        npm run lint

    - name: Run TypeScript Type Check
      run: |
        npm run type-check

    - name: Validate Next.js Production Build
      env:
        NEXT_PUBLIC_API_URL: https://tripsync-backend-ra7p.onrender.com
      run: |
        npm run build

    - name: Run E2E & API Verification Tests
      env:
        NEXT_PUBLIC_API_URL: https://tripsync-backend-ra7p.onrender.com
      run: |
        python e2e-tests/run_tests.py

    - name: Upload Test Excel Report Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: TripSync-Excel-TestReport
        path: TripSync_TestReport.xlsx

    - name: Upload Test HTML Report Dashboard Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: TripSync-HTML-TestReport
        path: execution-report.html

    - name: Upload Markdown & JSON Report Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: TripSync-Exec-Reports
        path: |
          execution-report.md
          execution-report.json
